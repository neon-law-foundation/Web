# AWS CodeBuild buildspec for NLF Web Lambda deployment
#
# ASSUMPTIONS - the CodeBuild project in Sagebrush/AWS must be configured with:
#
#   Build environment:
#     Image:        aws/codebuild/amazonlinux2-aarch64-standard:3.0
#     Architecture: ARM_CONTAINER (arm64 / Graviton)
#     Swift:        pre-installed in the above image - no install phase needed
#
#   Environment variables (set in CodeBuildStack CloudFormation parameters):
#     LAMBDA_FUNCTION_NAME  - name of the Lambda function to update
#
#   IAM permissions on the CodeBuild service role:
#     lambda:UpdateFunctionCode  - to push the new zip to Lambda
#     lambda:GetFunction         - to verify the update succeeded
#
# LAMBDA FUNCTION - must be configured in APILambdaStack with:
#     Runtime:      provided.al2023
#     Architecture: arm64
#     Handler:      bootstrap
#
# WHY --static-swift-stdlib:
#   The Lambda execution environment (Amazon Linux 2023) does not have Swift
#   installed. This flag statically links the Swift standard library into the
#   binary so it has no external Swift dependencies at runtime.
#
# WHY the binary is renamed to "bootstrap":
#   Lambda custom runtimes (provided.al2023) look for an executable named
#   "bootstrap" in the root of the deployment zip. The Swift binary can be
#   named anything during the build; it must be renamed before zipping.

version: 0.2

phases:
  build:
    commands:
      - swift build -c release --product App --static-swift-stdlib
      - cp .build/release/App bootstrap
      - zip lambda.zip bootstrap

  post_build:
    commands:
      - aws lambda update-function-code --function-name $LAMBDA_FUNCTION_NAME --zip-file fileb://lambda.zip
      - aws lambda invoke
          --function-name $MIGRATION_LAMBDA_FUNCTION_NAME
          --invocation-type RequestResponse
          --log-type Tail
          /tmp/migration-result.json
